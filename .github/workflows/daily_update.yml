name: Daily World Cup Forecast Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    env:
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast pipeline
        run: |
          python scripts/main_run_worldcup_pipeline.py

      - name: Commit updated forecast files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "Auto update forecast data"
          git push